name: vaultx
description: Social Media Password Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  font_awesome_flutter: ^10.6.0
  uuid: ^4.2.1
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  crypto: ^3.0.3
  shared_preferences: ^2.2.2

dev_dependencies: 
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png

flutter:
  uses-material-design: true
